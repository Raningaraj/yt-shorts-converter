app = "yt-shorts-converter"
kill_signal = "SIGINT"
kill_timeout = 5

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  [services.concurrency]
    type = "connections"
    soft_limit = 20
    hard_limit = 25
  [[services.ports]]
    handlers = ["http"]
    port = 80
