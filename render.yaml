services:
  - type: web
    name: yt-shorts-converter-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers=1 --threads=4 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: GROQ_API_KEY
        sync: false
    healthCheckPath: /api/health
